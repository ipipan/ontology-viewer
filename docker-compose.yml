# =============================================================================
# Ontology Viewer — Docker Compose Production Stack
# =============================================================================
# Usage:
#   1. Place SSL certs in nginx/ssl/: fullchain.pem, privkey.pem
#   2. Generate DH params: openssl dhparam -out nginx/ssl/dhparam.pem 2048
#   3. Copy .env.example to .env and adjust settings
#   4. docker compose up -d
# =============================================================================

services:
  # ===========================================================================
  # Nginx Reverse Proxy — Entry point, SSL termination, DDoS protection
  # ===========================================================================
  nginx:
    image: nginx:1.27-alpine
    container_name: ontology-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Nginx configuration (mounted directly as main config)
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/security.conf:/etc/nginx/conf.d/security.conf:ro
      # Frontend static files (built by frontend service) — must come BEFORE error pages
      - frontend_assets:/usr/share/nginx/html:ro
      # Custom error pages (separate directory — mounted before frontend volume)
      - ./nginx/html:/usr/share/nginx/custom_errors:ro
      # SSL certificates (user-provided)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # Logs (persistent, fail2ban-compatible)
      - nginx_logs:/var/log/nginx
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-example.com}
      # Only substitute DOMAIN_NAME — prevents envsubst from breaking
      # nginx variables like $host, $uri, $remote_addr, etc.
      - NGINX_ENVSUBST_FILTER=DOMAIN_NAME
    depends_on:
      frontend:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "-k", "--http1.1", "-o", "/dev/null", "-A", "nginx-health-check", "https://localhost/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ===========================================================================
  # Backend — FastAPI / Uvicorn API Server
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ontology-backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./data:/app/data:ro
    environment:
      - DATA_DIR=/app/data
      - HOST=0.0.0.0
      - PORT=8000
      - RELOAD=false
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://example.com}
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 4G
        reservations:
          cpus: "0.25"
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # Frontend — Angular Build (build-only, outputs to shared volume)
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ontology-frontend-build
    volumes:
      - frontend_assets:/app/dist/ontology-viewer
    # This container exits after copying built assets — that's expected
    restart: "no"


# =============================================================================
# Networks — Isolate backend from direct external access
# =============================================================================
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
    internal: true

# =============================================================================
# Volumes
# =============================================================================
volumes:
  frontend_assets:
    driver: local
  nginx_logs:
    driver: local
