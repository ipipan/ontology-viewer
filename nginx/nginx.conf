# =============================================================================
# Ontology Viewer — Hardened Nginx Reverse Proxy Configuration
# =============================================================================
# DDoS Protection: rate limiting, connection limits, slowloris prevention,
#                  bot blocking, request size limits
# HTTPS:          User-provided external SSL certificates
#
# NOTE: This file is processed by envsubst in the nginx Docker entrypoint.
#       ${DOMAIN_NAME} is replaced with the value from the environment.
#       Dollar signs used in nginx variables ($host, $uri, etc.) are preserved
#       because we limit envsubst to only DOMAIN_NAME.
# =============================================================================

# --- Worker Configuration ---
worker_processes auto;
worker_rlimit_nofile 8192;
pid /run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    # --- Basic Settings ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version from responses
    server_tokens off;

    # --- Load Security Rules (bot blocking maps) ---
    include /etc/nginx/conf.d/security.conf;

    # --- Logging ---
    # Extended log format for fail2ban compatibility and DDoS analysis
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'ua="$upstream_addr" us="$upstream_status" '
                    'ut="$upstream_response_time" '
                    'rl="$limit_req_status" '
                    'cs=$upstream_cache_status';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # --- Performance ---
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # --- Timeouts (slowloris protection) ---
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;
    keepalive_timeout     15s;
    keepalive_requests    100;
    reset_timedout_connection on;

    # --- Buffer Limits (prevent buffer overflow attacks) ---
    client_body_buffer_size    16k;
    client_header_buffer_size  1k;
    large_client_header_buffers 4 8k;
    client_max_body_size       1m;

    # --- Rate Limiting Zones ---
    # General requests: 10 req/s per IP, burst of 20
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    # API requests: 5 req/s per IP, burst of 10
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # Login/auth (future): 1 req/s per IP
    limit_req_zone $binary_remote_addr zone=strict:10m rate=1r/s;

    # Connection limiting: max concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Proper status codes for rate limiting
    limit_req_status  429;
    limit_conn_status 429;

    # --- Gzip Compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff2;

    # --- Upstream Definitions ---
    upstream backend_api {
        server backend:8000;
        keepalive 32;
    }

    # =========================================================================
    # HTTP Server — Redirect all traffic to HTTPS
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name ${DOMAIN_NAME};

        # --- Redirect all HTTP traffic to HTTPS ---
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =========================================================================
    # HTTPS Server — Main Application
    # =========================================================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name ${DOMAIN_NAME};

        # --- SSL Certificate (user-provided external certificate) ---
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # --- SSL Configuration ---
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # DH parameters for forward secrecy
        ssl_dhparam /etc/nginx/ssl/dhparam.pem;

        # OCSP stapling (enable if your CA provides the chain)
        # ssl_stapling on;
        # ssl_stapling_verify on;
        # ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # --- Bot Blocking ---
        if ($bad_bot) {
            return 444;
        }

        # --- Connection Limits ---
        limit_conn conn_per_ip 20;

        # --- Security Headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

        # --- Block Hidden Files ---
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # --- API Proxy ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://backend_api/api/;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Proxy timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Keepalive to upstream
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Disable buffering for real-time responses
            proxy_buffering off;
        }

        # --- Frontend Static Files ---
        location / {
            limit_req zone=general burst=20 nodelay;

            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # Don't cache HTML (for SPA routing)
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # --- Error Pages ---
        error_page 429 /429.html;
        location = /429.html {
            root /usr/share/nginx/custom_errors;
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/custom_errors;
            internal;
        }
    }
}
