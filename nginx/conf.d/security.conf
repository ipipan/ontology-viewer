# =============================================================================
# Security Rules — Bot Blocking & Access Control
# =============================================================================

# Block requests with empty or known-bad User-Agent strings
# Returns 444 (nginx drops the connection with no response)
map $http_user_agent $bad_bot {
    default         0;
    ""              1;
    "~*semrush"     1;
    "~*ahrefs"      1;
    "~*mj12bot"     1;
    "~*dotbot"      1;
    "~*blexbot"     1;
    "~*sogou"       1;
    "~*yandexbot"   1;
    "~*petalbot"    1;
    "~*baiduspider" 1;
    "~*sqlmap"      1;
    "~*nikto"       1;
    "~*masscan"     1;
    "~*nmap"        1;
    "~*zgrab"       1;
    "~*censys"      1;
    "~*python-requests" 1;
    "~*go-http-client"  1;
    "~*wget"        1;
    "~*curl"        1;
}

